    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --navy: #052C5C;
      --blue: #197AD2;
      --ice: #76C4F8;
      --white: #FAFCFF;
      /* CORES COM CONTRASTE CORRIGIDO */
      --text-dark: #052C5C;
      --text-body: #1a3a5c;
      --text-light: #2a4a6e;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--white);
      color: var(--text-dark)
    }

    /* SKIP TO CONTENT - PARA ACESSIBILIDADE */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--navy);
      color: var(--white);
      padding: 8px 16px;
      text-decoration: none;
      z-index: 999;
      font-size: 0.875rem;
      font-weight: 500;
      transition: top 0.2s;
    }

    .skip-link:focus-visible {
      top: 0;
      outline: 3px solid var(--ice);
      outline-offset: 0;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 7%;
      background: rgba(250, 252, 255, 0.98);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(5, 44, 92, .08)
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: .7rem;
      text-decoration: none
    }

    .nav-logo img {
      height: 72px
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1
    }

    .nav-logo-text strong {
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .18em;
      color: var(--navy);
      text-transform: uppercase
    }

    .nav-logo-text span {
      font-size: .58rem;
      font-weight: 400;
      letter-spacing: .2em;
      color: var(--blue);
      text-transform: uppercase
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      list-style: none
    }

    .nav-links a {
      color: var(--navy);
      text-decoration: none;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      transition: color .2s
    }

    .nav-links a:hover {
      color: var(--blue)
    }

    .nav-cta {
      background: var(--navy);
      color: var(--white) !important;
      padding: .55rem 1.4rem;
      border-radius: 2px;
      transition: background .2s !important
    }

    .nav-cta:hover {
      background: var(--blue) !important
    }

    /* HERO - CONTRASTE CORRIGIDO */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      overflow: hidden
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url(images/hero.png);
      background-size: cover;
      background-position: center top
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(5, 44, 92, 0.94) 38%, rgba(5, 44, 92, 0.50) 100%)
      /* CONTRASTE CORRIGIDO: aumentado de 0.85 para 0.94 */
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 8rem 7% 6rem;
      max-width: 600px
    }

    .hero-eyebrow {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #b8ddfc;
      /* CONTRASTE CORRIGIDO: mais claro para contraste */
      margin-bottom: 1.4rem
    }

    .hero-content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 6.5vw, 6rem);
      line-height: 1.02;
      color: #FFFFFF;
      margin-bottom: 1.6rem
    }

    .hero-content h1 em {
      font-style: italic;
      color: #a8d9fc
    }

    .hero-desc {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.92);
      /* CONTRASTE CORRIGIDO: aumentado de 0.7 para 0.92 */
      line-height: 1.8;
      max-width: 400px;
      margin-bottom: 2.6rem
    }

    .hero-actions {
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap
    }

    .btn-primary {
      background: var(--ice);
      color: var(--navy);
      padding: .85rem 2.2rem;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background .2s
    }

    .btn-primary:hover {
      background: #a8d9fc
    }

    .btn-ghost {
      border: 1px solid rgba(255, 255, 255, 0.7);
      color: #FFFFFF;
      padding: .85rem 2.2rem;
      text-decoration: none;
      font-size: .82rem;
      font-weight: 400;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: border-color .2s
    }

    .btn-ghost:hover {
      border-color: #FFFFFF
    }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0 7%;
      margin: 4rem 0
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(5, 44, 92, .15)
    }

    .divider-text {
      font-size: .68rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #4a6a8a;
      white-space: nowrap
    }

    /* SECTION - CONTRASTE CORRIGIDO */
    .section-label {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #197AD2;
      margin-bottom: .7rem
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 4vw, 3.2rem);
      color: var(--navy);
      line-height: 1.08
    }

    .section-title em {
      font-style: italic
    }

    .section-desc {
      font-size: .9rem;
      font-weight: 300;
      color: var(--text-body);
      line-height: 1.8;
      margin-top: .8rem
    }

    .section-header {
      margin-bottom: 3.5rem
    }

    /* SERVIÇOS - CONTRASTE CORRIGIDO */
    #servicos {
      padding: 5rem 7%;
      overflow: visible
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem
    }

    .svc {
      border: 1px solid rgba(5, 44, 92, .09);
      border-radius: 3px;
      overflow: hidden;
      transition: box-shadow .35s, transform .35s;
      background: var(--white)
    }

    .svc:hover {
      box-shadow: 0 16px 48px rgba(5, 44, 92, .13);
      transform: translateY(-5px)
    }

    .svc-img {
      height: 240px;
      background-size: cover;
      background-position: center;
      position: relative
    }

    .svc-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5, 44, 92, 0.7) 0%, transparent 55%)
      /* CONTRASTE CORRIGIDO: aumentado de 0.55 para 0.7 */
    }

    .svc-img-label {
      position: absolute;
      bottom: 1rem;
      left: 1.2rem;
      z-index: 1;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      color: #FFFFFF;
      letter-spacing: .04em
    }

    .svc-body {
      padding: 1.7rem
    }

    .svc-body h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--navy);
      margin-bottom: .55rem
    }

    /* CONTRASTE CORRIGIDO: texto dos serviços mais escuro */
    .svc-body p {
      font-size: .84rem;
      font-weight: 300;
      color: var(--text-body);
      line-height: 1.72;
      margin-bottom: 1rem
    }

    /* BANNER - CONTRASTE CORRIGIDO */
    #banner {
      position: relative;
      height: 420px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .banner-bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 44, 92, 0.75);
      /* CONTRASTE CORRIGIDO: aumentado de 0.48 para 0.75 */
      z-index: 1;
    }

    .banner-content {
      position: relative;
      z-index: 2;
      padding: 0 7%;
    }

    .banner-content blockquote {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      color: #FFFFFF;
      line-height: 1.08;
      max-width: 680px;
    }

    .banner-content cite {
      display: block;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #b8ddfc;
      /* CONTRASTE CORRIGIDO: mais claro */
      font-style: normal;
    }

    /* COMO - CONTRASTE CORRIGIDO */
    #como {
      padding: 5rem 7%;
      background: rgba(118, 196, 248, .04);
      border-top: 1px solid rgba(5, 44, 92, .06);
      border-bottom: 1px solid rgba(5, 44, 92, .06)
    }

    .como-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start
    }

    .steps {
      display: flex;
      flex-direction: column
    }

    .step {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 1.4rem;
      align-items: start;
      padding: 1.8rem 0;
      border-bottom: 1px solid rgba(5, 44, 92, .07)
    }

    .step:last-child {
      border-bottom: none
    }

    .step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--ice);
      line-height: 1
    }

    .step h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--navy);
      margin-bottom: .35rem
    }

    /* CONTRASTE CORRIGIDO: texto do step */
    .step p {
      font-size: .84rem;
      font-weight: 300;
      color: var(--text-body);
      line-height: 1.7
    }

    .aside-card {
      background: var(--navy);
      padding: 2.8rem;
      border-radius: 3px;
      position: sticky;
      top: 6rem
    }

    .aside-card .big {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.5rem;
      font-weight: 300;
      color: #a8d9fc;
      line-height: 1;
      display: block;
      margin-bottom: .8rem
    }

    .aside-card>p {
      color: rgba(250, 252, 255, 0.85);
      /* CONTRASTE CORRIGIDO: aumentado de 0.55 para 0.85 */
      font-size: .88rem;
      line-height: 1.75
    }

    .dif-list {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
      margin-top: 1.8rem
    }

    .dif-item {
      display: flex;
      gap: .9rem;
      align-items: flex-start
    }

    .dif-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ice);
      flex-shrink: 0;
      margin-top: 7px
    }

    .dif-item p {
      font-size: .84rem;
      font-weight: 300;
      color: rgba(250, 252, 255, 0.85);
      /* CONTRASTE CORRIGIDO: aumentado de 0.58 para 0.85 */
      line-height: 1.65
    }

    .dif-item strong {
      color: #FFFFFF;
      font-weight: 500
    }

    /* CONTATO - CONTRASTE CORRIGIDO */
    #contato {
      padding: 5rem 7%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
      background: var(--navy)
    }

    #contato .section-label {
      color: #a8d9fc;
    }

    #contato .section-title {
      color: #FFFFFF
    }

    #contato .section-desc {
      color: rgba(250, 252, 255, 0.75);
      /* CONTRASTE CORRIGIDO: aumentado de 0.48 para 0.75 */
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem
    }

    .ci {
      font-size: .84rem;
      color: rgba(250, 252, 255, 0.85);
      /* CONTRASTE CORRIGIDO: aumentado de 0.58 para 0.85 */
      display: flex;
      gap: .8rem;
      align-items: center
    }

    .ci-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--ice);
      flex-shrink: 0
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      margin-bottom: 1rem
    }

    /* CONTRASTE CORRIGIDO: labels mais claras e legíveis */
    .fg label {
      font-size: .67rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #b8ddfc;
    }

    .fg label::after {
      content: " *";
      color: #ffb347;
      display: inline-block;
    }

    .fg label.optional::after {
      content: " (opcional)";
      color: rgba(184, 221, 252, 0.7);
      font-size: 0.6rem;
      font-weight: normal;
      text-transform: none;
      letter-spacing: normal;
    }

    .fg input,
    .fg textarea,
    .fg select {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(118, 196, 248, .35);
      border-radius: 2px;
      padding: .75rem 1rem;
      color: #FFFFFF;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      outline: none;
      width: 100%;
      transition: border-color .2s
    }

    .fg input:focus,
    .fg textarea:focus,
    .fg select:focus {
      border-color: var(--ice)
    }

    .fg input::placeholder,
    .fg textarea::placeholder {
      color: rgba(250, 252, 255, 0.45)
    }

    .fg textarea {
      resize: vertical;
      min-height: 90px
    }

    .fg select option {
      background: var(--navy)
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem
    }

    .btn-submit {
      width: 100%;
      background: var(--ice);
      color: var(--navy);
      border: none;
      border-radius: 2px;
      padding: .9rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: .82rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s;
      margin-top: .3rem
    }

    .btn-submit:hover {
      background: #a8d9fc
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* FOOTER - CONTRASTE CORRIGIDO */
    footer {
      background: #031e3f;
      text-align: center;
      padding: 1.8rem 7%;
      color: rgba(250, 252, 255, 0.55);
      /* CONTRASTE CORRIGIDO: aumentado de 0.26 para 0.55 */
      font-size: .78rem
    }

    footer strong {
      color: var(--ice)
    }

    /* REVEAL */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity .7s, transform .7s
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0)
    }

    /* SLIDECURL - CONTRASTE CORRIGIDO */
    #slidecurl {
      background: #052C5C;
      padding: 5rem 7%
    }

    .sc-header {
      text-align: center;
      max-width: 680px;
      margin: 0 auto 3rem
    }

    .sc-label {
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: #a8d9fc;
      margin-bottom: .9rem
    }

    .sc-header h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 3.5vw, 3rem);
      line-height: 1.08;
      color: #FFFFFF
    }

    .sc-header h3 em {
      font-style: italic;
      color: var(--ice)
    }

    .sc-desc {
      font-size: .9rem;
      font-weight: 300;
      color: rgba(250, 252, 255, 0.85);
      line-height: 1.85;
      margin-top: 1rem
    }

    .sc-desc strong {
      color: #FFFFFF;
      font-weight: 500
    }

    .sc-image-wrap {
      margin: 0 auto 3rem
    }

    .sc-main-img {
      width: 100%;
      border-radius: 8px;
      display: block;
      object-fit: cover
    }

    .sc-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid rgba(118, 196, 248, .25);
      margin-bottom: 3rem
    }

    .sc-step {
      padding: 2rem 2rem 2rem 0;
      border-right: 1px solid rgba(118, 196, 248, .15)
    }

    .sc-step:last-child {
      border-right: none;
      padding-right: 0
    }

    .sc-step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 300;
      color: rgba(118, 196, 248, 0.45);
      line-height: 1;
      margin-bottom: .6rem
    }

    .sc-step h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: #FFFFFF;
      margin-bottom: .4rem
    }

    .sc-step p {
      font-size: .82rem;
      font-weight: 300;
      color: rgba(250, 252, 255, 0.8);
      line-height: 1.7
    }

    .sc-foot {
      text-align: center;
      padding: 1rem 0 2rem
    }

    .sc-cta {
      display: inline-block;
      background: var(--ice);
      color: var(--navy);
      padding: 1rem 2.8rem;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      border-radius: 100px;
      transition: background .2s, transform .2s;
      white-space: nowrap
    }

    .sc-cta:hover {
      background: #a8d9fc;
      transform: translateY(-2px)
    }

    /* DEPOIMENTOS - CONTRASTE CORRIGIDO */
    #depoimentos {
      padding: 5rem 7%;
      background: rgba(118, 196, 248, .04);
      border-top: 1px solid rgba(5, 44, 92, .06);
      border-bottom: 1px solid rgba(5, 44, 92, .06)
    }

    #depoimentos .section-header {
      text-align: center;
      margin-bottom: 3.5rem
    }

    #depoimentos .section-header .section-title {
      color: var(--navy)
    }

    .dep-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem
    }

    .dep-card {
      background: var(--white);
      border: 1px solid rgba(5, 44, 92, .09);
      border-radius: 3px;
      padding: 2.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      transition: box-shadow .3s, transform .3s
    }

    .dep-card:hover {
      box-shadow: 0 12px 40px rgba(5, 44, 92, .1);
      transform: translateY(-4px)
    }

    .dep-quote {
      font-size: 2rem;
      font-family: 'Cormorant Garamond', serif;
      color: var(--ice);
      line-height: 1
    }

    /* CONTRASTE CORRIGIDO: texto do depoimento */
    .dep-text {
      font-size: .9rem;
      font-weight: 300;
      color: var(--text-body);
      line-height: 1.8;
      flex: 1
    }

    .dep-author {
      border-top: 1px solid rgba(5, 44, 92, .08);
      padding-top: 1rem
    }

    .dep-author strong {
      display: block;
      font-size: .88rem;
      font-weight: 600;
      color: var(--navy)
    }

    .dep-author span {
      font-size: .78rem;
      font-weight: 300;
      color: #5a7a9a
    }

    /* FAQ - CONTRASTE CORRIGIDO */
    #faq {
      padding: 5rem 7%;
      background: #fff
    }

    #faq .section-header {
      text-align: center;
      margin-bottom: 3.5rem
    }

    .faq-list {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: .5rem
    }

    .faq-item {
      border: 1px solid rgba(5, 44, 92, .15);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow .2s
    }

    .faq-item:hover {
      box-shadow: 0 4px 20px rgba(5, 44, 92, .08)
    }

    .faq-q {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: none;
      border: none;
      padding: 1.3rem 1.6rem;
      cursor: pointer;
      text-align: left;
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      gap: 1.2rem;
      line-height: 1.4;
      transition: background .2s
    }

    .faq-q:hover {
      background: rgba(5, 44, 92, .03)
    }

    .faq-q.open {
      background: rgba(5, 44, 92, .05)
    }

    .faq-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border: 1.5px solid rgba(5, 44, 92, .3);
      border-radius: 50%;
      position: relative;
      transition: border-color .2s, background .2s
    }

    .faq-q.open .faq-icon {
      background: var(--navy);
      border-color: var(--navy)
    }

    .faq-icon::before,
    .faq-icon::after {
      content: '';
      position: absolute;
      background: var(--navy);
      border-radius: 2px;
      transition: transform .3s, opacity .3s
    }

    .faq-q.open .faq-icon::before,
    .faq-q.open .faq-icon::after {
      background: #fff
    }

    .faq-icon::before {
      width: 10px;
      height: 1.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%)
    }

    .faq-icon::after {
      width: 1.5px;
      height: 10px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%)
    }

    .faq-q.open .faq-icon::after {
      transform: translate(-50%, -50%) scaleY(0);
      opacity: 0
    }

    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height .38s cubic-bezier(.4, 0, .2, 1)
    }

    .faq-a.open {
      max-height: 500px
    }

    .faq-a-inner {
      padding: 0 1.6rem 1.4rem 1.6rem;
      font-size: .88rem;
      font-weight: 300;
      color: var(--text-body);
      line-height: 1.85;
      border-top: 1px solid rgba(5, 44, 92, .1)
    }

    .faq-a-inner p {
      padding-top: 1rem
    }

    .faq-a-inner strong {
      color: var(--navy);
      font-weight: 600
    }

    /* ACESSIBILIDADE - FOCO VISÍVEL PARA TECLADO */
    a:focus-visible,
    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible,
    [role="button"]:focus-visible,
    [tabindex]:focus-visible {
      outline: 3px solid var(--ice);
      outline-offset: 3px;
      border-radius: 2px;
    }

    a:focus:not(:focus-visible),
    button:focus:not(:focus-visible) {
      outline: none;
    }

    /* SR ONLY - PARA LEITORES DE TELA */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }
